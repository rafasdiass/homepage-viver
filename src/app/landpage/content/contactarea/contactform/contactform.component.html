<div class="contact-form-card">
  <h3>Qual projeto gostaria de trabalhar?</h3>

  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Seu Nome</label>
      <input type="text" id="name" formControlName="name" placeholder="Escreva seu nome" />
    </div>

    <div class="form-group">
      <label for="email">Seu Email</label>
      <input type="email" id="email" formControlName="email" placeholder="exemplo@dominio.com" />
    </div>

    <div class="form-group">
      <label for="phone">Seu Telefone</label>
      <input type="tel" id="phone" formControlName="phone" placeholder="(99) 99999-9999" />
    </div>

    <div class="form-group">
      <label for="message">Mensagem</label>
      <textarea id="message" formControlName="message" placeholder="Escreva sua mensagem aqui"></textarea>
    </div>

    <button type="submit" [disabled]="contactForm.invalid">Enviar Mensagem</button>
  </form>

  <div *ngIf="successMessage" class="alert success">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>
</div>
